services:
  postgis-test:
    # Use ARM64-compatible image for Apple Silicon
    image: ghcr.io/baosystems/postgis:17-3.5
    container_name: maproulette-postgis-test
    environment:
      POSTGRES_DB: mr_test
      POSTGRES_USER: mr_test_user
      POSTGRES_PASSWORD: mr_test_password
    ports:
      - "5433:5432"  # Use different port to avoid conflicts
    shm_size: 512mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mr_test_user -d mr_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    # No volume mount - fresh database each time


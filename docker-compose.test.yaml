# Test stack for E2E tests. Compatible with `docker compose` and `podman compose`.
# Started by Playwright's webServer (see playwright.config.ts) or manually:
#   docker compose -f docker-compose.test.yaml up
#   podman compose -f docker-compose.test.yaml up

services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: maproulette
      POSTGRES_USER: maproulette
      POSTGRES_PASSWORD: hunter2
    # No fixed host port: the backend reaches this over the compose network via
    # the `db` hostname, and a fixed "5432:5432" mapping collides with any other
    # local Postgres already bound to that port on the host. Publish without a
    # host port so Docker picks a free one if you need to connect directly
    # (`docker compose -f docker-compose.test.yaml port db 5432`).
    ports:
      - "5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "maproulette", "-d", "maproulette"]
      interval: 2s
      timeout: 3s
      retries: 30

  backend:
    image: ghcr.io/maproulette/maproulette-backend:4.9.0
    platform: linux/amd64 # TODO: remove once the image above supports multi-arch
    init: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      MR_DATABASE_URL: jdbc:postgresql://db:5432/maproulette
      MR_DATABASE_USERNAME: maproulette
      MR_DATABASE_PASSWORD: hunter2
      # Must match VITE_SERVER_API_KEY in .env.test. Any request bearing this
      # value in the `apiKey` header is treated by the backend as a super-user.
      # (Which may not always be what you want in tests, so TODO I guess)
      MR_SUPER_KEY: super-secret-key
      APPLICATION_SECRET: test-application-secret-at-least-32-chars
      MAPROULETTE_SECRET_KEY: test-maproulette-secret-key-at-least-32-chars
      # OAuth values are required for the backend to boot but are not used
      # (the tests all use API key auth)
      MR_OSM_SERVER: https://master.apis.dev.openstreetmap.org
      MR_OAUTH_CONSUMER_KEY: not_a_real_key
      MR_OAUTH_CONSUMER_SECRET: not_a_real_secret
    ports:
      - "9000:80"
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/api/v2/service/info || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s

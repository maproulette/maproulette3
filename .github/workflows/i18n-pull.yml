# Nightly pull of translated catalogs from Transifex; opens a PR when deltas exist.
# Requires the TX_TOKEN repo secret (configure in Settings → Secrets and variables → Actions).
name: i18n Pull

on:
  schedule:
    # Nightly at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  pull:
    name: Pull translations and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Transifex CLI
        run: |
          curl -o- https://raw.githubusercontent.com/transifex/cli/master/install.sh | bash
          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH

      - name: Pull translations from Transifex
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}
        run: npm run i18n:pull

      - name: Create pull request for translation updates
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(i18n): sync translations from Transifex'
          title: 'chore(i18n): sync translations from Transifex'
          body: |
            Automated nightly sync of translated catalogs from Transifex.

            - Pulled via `npm run i18n:pull`
            - Only locales meeting the `minimum_perc` threshold in `.tx/config` are included.

            Please review the diff and merge once CI is green.
          branch: i18n/transifex-sync
          delete-branch: true
          add-paths: |
            src/i18n/messages/*.json
          labels: |
            i18n
            automated

name: Build

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main', 'master', 'develop']

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting, lint, and typecheck
        run: npm run check

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

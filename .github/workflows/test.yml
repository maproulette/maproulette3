name: E2E Tests

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main', 'master', 'develop']

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: ghcr.io/baosystems/postgis:17-3.5
        env:
          POSTGRES_DB: mr_test
          POSTGRES_USER: mr_test_user
          POSTGRES_PASSWORD: mr_test_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U mr_test_user -d mr_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
          --shm-size=512mb

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4

      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/maproulette-backend
          path: maproulette-backend
          ref: add-new-endpoints
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Verify backend repository
        run: |
          if [ ! -d "maproulette-backend" ]; then
            echo "⚠️  Backend repository not found. Tests may fail if backend is required."
            echo "If the backend repository is private, ensure GITHUB_TOKEN has access."
            echo "If the repository name is different, update the workflow file."
          else
            echo "✓ Backend repository checked out successfully"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (for Scala/sbt)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache sbt dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            maproulette-backend/target
            maproulette-backend/project/target
          key: ${{ runner.os }}-sbt-${{ hashFiles('maproulette-backend/build.sbt', 'maproulette-backend/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install frontend dependencies
        run: npm ci

      - name: Create .env.test file
        run: |
          cat > .env.test << EOF
          VITE_APP_NAME="MapRoulette Test"
          VITE_APP_DESCRIPTION="MapRoulette 4 Test Environment"
          VITE_API_BASE_URL="http://localhost:9001"
          VITE_MAP_ROULETTE_SERVER_WEBSOCKET_URL="ws://localhost:9001/ws"
          VITE_SERVER_OAUTH_URL="http://localhost:9001/auth/authenticate"
          VITE_SERVER_API_KEY=""
          VITE_APP_URL="http://localhost:3005"
          VITE_OSM_SERVER="https://master.apis.dev.openstreetmap.org"
          REACT_APP_USERNAME=${{ secrets.REACT_APP_USERNAME || '' }}
          REACT_APP_PASSWORD=${{ secrets.REACT_APP_PASSWORD || '' }}
          EOF

      - name: Set up test environment variables
        run: |
          echo "MAPROULETTE_BACKEND_DIR=$(pwd)/maproulette-backend" >> $GITHUB_ENV
          echo "MR_BACKEND_PORT=9001" >> $GITHUB_ENV
          echo "MR_AKKA_PORT=25520" >> $GITHUB_ENV
          # Use GitHub Actions service (localhost:5433 maps to service port 5432)
          echo "MR_DATABASE_URL=jdbc:postgresql://localhost:5433/mr_test" >> $GITHUB_ENV
          echo "MR_DATABASE_USERNAME=mr_test_user" >> $GITHUB_ENV
          echo "MR_DATABASE_PASSWORD=mr_test_password" >> $GITHUB_ENV
          echo "APPLICATION_SECRET=TEST_SECRET_KEY_32_CHARS_LONG_12345678901234567890" >> $GITHUB_ENV
          echo "MAPROULETTE_SECRET_KEY=TEST_SECRET_KEY_32_CHARS_LONG_12345678901234567890" >> $GITHUB_ENV
          echo "MR_OSM_SERVER=https://master.apis.dev.openstreetmap.org" >> $GITHUB_ENV
          echo "MR_OAUTH_CONSUMER_KEY=test_key" >> $GITHUB_ENV
          echo "MR_OAUTH_CONSUMER_SECRET=test_secret" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV

      - name: Wait for database to be ready
        run: |
          echo "Waiting for database service to be ready..."
          timeout 60 bash -c 'until pg_isready -h localhost -p 5433 -U mr_test_user -d mr_test 2>/dev/null; do echo "Waiting for database..."; sleep 2; done' || true
          # Also try with psql as fallback
          timeout 10 bash -c 'until PGPASSWORD=mr_test_password psql -h localhost -p 5433 -U mr_test_user -d mr_test -c "SELECT 1" > /dev/null 2>&1; do echo "Waiting for database connection..."; sleep 1; done'
          echo "Database is ready!"

      - name: Run E2E tests
        run: npm run test
        env:
          MAPROULETTE_BACKEND_DIR: ${{ github.workspace }}/maproulette-backend
          MR_BACKEND_PORT: 9001
          MR_AKKA_PORT: 25520
          MR_DATABASE_URL: jdbc:postgresql://localhost:5433/mr_test
          MR_DATABASE_USERNAME: mr_test_user
          MR_DATABASE_PASSWORD: mr_test_password
          APPLICATION_SECRET: TEST_SECRET_KEY_32_CHARS_LONG_12345678901234567890
          MAPROULETTE_SECRET_KEY: TEST_SECRET_KEY_32_CHARS_LONG_12345678901234567890
          MR_OSM_SERVER: https://master.apis.dev.openstreetmap.org
          MR_OAUTH_CONSUMER_KEY: test_key
          MR_OAUTH_CONSUMER_SECRET: test_secret
          CI: true

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: playwright/.auth/
          retention-days: 7

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          # Database service is automatically cleaned up by GitHub Actions
          echo "Cleanup complete"


# Pushes the en-US source catalog to Transifex whenever it changes on main.
# Requires the TX_TOKEN repo secret (configure in Settings → Secrets and variables → Actions).
name: i18n Push

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'src/i18n/messages/en-US.json'
      - '.tx/config'
      - 'scripts/extractMessages.mjs'
      - '.github/workflows/i18n-push.yml'
  workflow_dispatch:

jobs:
  push:
    name: Extract and push source catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Transifex CLI
        run: |
          curl -o- https://raw.githubusercontent.com/transifex/cli/master/install.sh | bash
          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH

      - name: Extract messages
        run: npm run i18n:extract -- --write

      - name: Check for source catalog changes
        id: diff
        run: |
          if git diff --quiet HEAD -- src/i18n/messages/en-US.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No source catalog changes detected; skipping push."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Source catalog changed; pushing to Transifex."
          fi

      - name: Push source catalog to Transifex
        if: steps.diff.outputs.changed == 'true'
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}
        run: npm run i18n:push

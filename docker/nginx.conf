server {
  listen 80;
  charset utf-8;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  root /srv/www;

  # The app shell and runtime config must never be cached, so config changes and
  # new deploys take effect immediately. Hashed assets remain cacheable.
  location = /index.html {
    add_header Cache-Control "no-store";
  }
  location = /env.json {
    add_header Cache-Control "no-store";
  }

  location / {
    try_files $uri /index.html =404;
  }
}
